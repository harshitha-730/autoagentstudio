<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | AutoAgent Studio</title>
    <style>
        :root {
            --bg: #04121f;
            --panel: #0f172a;
            --border: #1e293b;
            --text: #f8fafc;
            --muted: #94a3b8;
            --accent: #06b6d4;
            --accent-hover: #0891b2;
            --danger-bg: #431407;
            --danger: #fdba74;
            --success-bg: #052e16;
            --success: #86efac;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", sans-serif;
            color: var(--text);
            background: linear-gradient(155deg, #0c4a6e, var(--bg) 45%);
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .card {
            width: min(100%, 500px);
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px;
        }

        h1 {
            margin: 0 0 8px;
            font-size: 1.7rem;
        }

        p {
            margin: 0 0 20px;
            color: var(--muted);
            font-size: 0.95rem;
        }

        .notification {
            padding: 10px 12px;
            border-radius: 10px;
            margin-bottom: 16px;
            font-size: 0.92rem;
        }

        .notification.success {
            background: var(--success-bg);
            color: var(--success);
            border: 1px solid #166534;
        }

        .notification.error {
            background: var(--danger-bg);
            color: var(--danger);
            border: 1px solid #9a3412;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: #cbd5e1;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 11px 12px;
            border: 1px solid #334155;
            border-radius: 10px;
            background: #020617;
            color: var(--text);
            margin-bottom: 14px;
            outline: none;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.2);
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        button {
            width: 100%;
            padding: 11px 14px;
            border: none;
            border-radius: 10px;
            background: var(--accent);
            color: white;
            font-size: 0.95rem;
            cursor: pointer;
            margin-top: 4px;
        }

        button:hover {
            background: var(--accent-hover);
        }

        .meta {
            margin-top: 16px;
            color: var(--muted);
            font-size: 0.9rem;
            text-align: center;
        }

        .meta a {
            color: #67e8f9;
            text-decoration: none;
        }

        @media (max-width: 600px) {
            .row {
                grid-template-columns: 1fr;
                gap: 0;
            }
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>Create account</h1>
        <p>Register once to track generated apps, versions, and downloads.</p>

        {% if notification %}
            <div class="notification {{ notification.level }}">{{ notification.message }}</div>
        {% endif %}

        <form method="post" action="/register">
            <label for="name">Name</label>
            <input id="name" name="name" type="text" autocomplete="name" required>

            <label for="email">Email</label>
            <input id="email" name="email" type="email" autocomplete="email" required>

            <div class="row">
                <div>
                    <label for="password">Password</label>
                    <input id="password" name="password" type="password" autocomplete="new-password" required>
                </div>
                <div>
                    <label for="confirm_password">Confirm Password</label>
                    <input id="confirm_password" name="confirm_password" type="password" autocomplete="new-password" required>
                </div>
            </div>

            <button type="submit">Register</button>
        </form>

        <p class="meta">Already have an account? <a href="/login">Login</a></p>
    </main>
</body>
</html>
