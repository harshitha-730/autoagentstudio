<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoAgent Studio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f1a;
            color: #ffffff;
            min-height: 100vh;
        }

        header {
            padding: 20px 40px;
            background: #1a1a2e;
            border-bottom: 1px solid #333;
            text-align: center;
        }

        header h1 {
            font-size: 2rem;
            background: linear-gradient(90deg, #7c3aed, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: #888;
            margin-top: 5px;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .input-section {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 30px;
            border: 1px solid #333;
        }

        .input-section label {
            display: block;
            margin-bottom: 10px;
            color: #aaa;
            font-size: 0.95rem;
        }

        textarea {
            width: 100%;
            padding: 15px;
            background: #0f0f1a;
            border: 1px solid #444;
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            resize: vertical;
            min-height: 120px;
            outline: none;
            transition: border 0.3s;
        }

        textarea:focus {
            border-color: #7c3aed;
        }

        button {
            margin-top: 15px;
            padding: 14px 30px;
            background: linear-gradient(90deg, #7c3aed, #3b82f6);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            transition: opacity 0.3s;
        }

        button:hover { opacity: 0.85; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .status {
            margin-top: 15px;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 0.9rem;
            display: none;
        }

        .status.loading {
            display: block;
            background: #1e3a5f;
            color: #60a5fa;
        }

        .status.error {
            display: block;
            background: #3b1a1a;
            color: #f87171;
        }

        .output-section {
            margin-top: 30px;
            display: none;
        }

        .output-section h2 {
            margin-bottom: 15px;
            color: #aaa;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .preview-container {
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #333;
        }

        .preview-bar {
            background: #1a1a2e;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .dot.red { background: #ef4444; }
        .dot.yellow { background: #f59e0b; }
        .dot.green { background: #10b981; }

        iframe {
            width: 100%;
            height: 500px;
            border: none;
            background: white;
        }

        .code-toggle {
            margin-top: 15px;
            background: #1a1a2e;
            border: 1px solid #333;
            border-radius: 10px;
            overflow: hidden;
        }

        .code-toggle summary {
            padding: 12px 20px;
            cursor: pointer;
            color: #aaa;
            font-size: 0.9rem;
        }

        .code-toggle pre {
            padding: 20px;
            overflow-x: auto;
            font-size: 0.8rem;
            color: #a78bfa;
            background: #0f0f1a;
            max-height: 300px;
            overflow-y: auto;
        }

        .preview-label {
            color: #666;
            font-size: 0.85rem;
            margin-left: 10px;
        }
    </style>
</head>
<body>

<header>
    <h1>⚡ AutoAgent Studio</h1>
    <p>Describe any app in plain English — AI will build it instantly</p>
</header>

<div class="container">
    <div class="input-section">
        <label>What app do you want to create?</label>
        <textarea id="promptInput" placeholder="e.g. Create a todo app where I can add, edit and delete tasks with a clean modern UI..."></textarea>
        <button id="generateBtn" onclick="generateApp()">⚡ Generate App</button>
        <div class="status" id="status"></div>
    </div>

    <div class="output-section" id="outputSection">
        <h2>🎉 Your Generated App</h2>
        <div class="preview-container">
            <div class="preview-bar">
                <div class="dot red"></div>
                <div class="dot yellow"></div>
                <div class="dot green"></div>
                <span class="preview-label">Live Preview</span>
            </div>
            <iframe id="previewFrame"></iframe>
        </div>

        <details class="code-toggle">
            <summary>📄 View Generated Code</summary>
            <pre id="codeOutput"></pre>
        </details>
    </div>
</div>

<script>
    async function generateApp() {
        const prompt = document.getElementById('promptInput').value.trim();
        const btn = document.getElementById('generateBtn');
        const status = document.getElementById('status');
        const outputSection = document.getElementById('outputSection');

        if (!prompt) {
            alert('Please enter a prompt first!');
            return;
        }

        btn.disabled = true;
        btn.textContent = '⏳ Generating...';
        status.className = 'status loading';
        status.textContent = '🤖 AI Agent is building your app... this may take a few seconds';
        outputSection.style.display = 'none';

        try {
            const response = await fetch('/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: prompt })
            });

            const data = await response.json();

            if (data.success) {
                status.style.display = 'none';
                
                // Show preview in iframe
                const iframe = document.getElementById('previewFrame');
                iframe.srcdoc = data.code;

                // Show code
                document.getElementById('codeOutput').textContent = data.code;

                outputSection.style.display = 'block';
                outputSection.scrollIntoView({ behavior: 'smooth' });
            } else {
                status.className = 'status error';
                status.textContent = '❌ Error: ' + data.error;
            }
        } catch (err) {
            status.className = 'status error';
            status.textContent = '❌ Connection error. Is the server running?';
        } finally {
            btn.disabled = false;
            btn.textContent = '⚡ Generate App';
        }
    }
</script>

</body>
</html>
