<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #222;
            font-family: 'Press Start 2P', cursive, monospace; /* Pixel-art font for retro feel */
            color: #eee;
            user-select: none;
            overflow: hidden; /* Prevent scrollbars from showing due to arrow keys */
        }

        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        #game-container {
            background-color: #333;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 25px rgba(0, 255, 0, 0.4);
            text-align: center;
            position: relative;
            border: 3px solid #0f0;
        }

        h1 {
            color: #0f0;
            margin-bottom: 15px;
            font-size: 1.8em;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.6);
        }

        #score {
            font-size: 1.2em;
            margin-bottom: 20px;
            color: #fff;
            background-color: #444;
            padding: 8px 15px;
            border-radius: 5px;
            display: inline-block;
            min-width: 100px;
        }

        #gameCanvas {
            background-color: #1a1a1a;
            border: 2px solid #0f0;
            display: block; /* Remove extra space below canvas */
            margin: 0 auto;
        }

        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            z-index: 10;
        }

        #gameOverScreen.visible {
            opacity: 1;
            visibility: visible;
        }

        #gameOverScreen h2 {
            color: #ff3333;
            font-size: 2.5em;
            margin-bottom: 15px;
            text-shadow: 0 0 15px rgba(255, 0, 0, 0.7);
        }

        #gameOverScreen p {
            font-size: 1.2em;
            margin-bottom: 25px;
            color: #fff;
        }

        #gameOverScreen button {
            background-color: #0f0;
            color: #1a1a1a;
            border: none;
            padding: 12px 25px;
            font-size: 1.1em;
            font-family: 'Press Start 2P', cursive, monospace;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }

        #gameOverScreen button:hover {
            background-color: #0c0;
            transform: translateY(-2px);
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.8);
        }

        #gameOverScreen button:active {
            transform: translateY(0);
            box-shadow: 0 0 5px rgba(0, 255, 0, 0.3);
        }
    </style>
</head>
<body>
    <div id="game-container">
        <h1>SNAKE</h1>
        <div id="score">Score: 0</div>
        <canvas id="gameCanvas"></canvas>
        <div id="gameOverScreen">
            <h2>GAME OVER!</h2>
            <p>Your final score: <span id="finalScore">0</span></p>
            <button id="restartButton">RESTART</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScoreDisplay = document.getElementById('finalScore');
        const restartButton = document.getElementById('restartButton');

        const gridSize = 20; // Number of cells per row/column
        const cellSize = 20; // Size of each cell in pixels
        canvas.width = gridSize * cellSize;
        canvas.height = gridSize * cellSize;

        let snake;
        let food;
        let dx; // delta x (horizontal direction)
        let dy; // delta y (vertical direction)
        let score;
        let gameInterval;
        let isGameOver;
        let changingDirection; // Flag to prevent multiple direction changes per game tick

        function initGame() {
            snake = [{ x: 10, y: 10 }]; // Snake starts in the middle
            dx = 1; // Initial direction: right
            dy = 0;
            score = 0;
            scoreDisplay.textContent = `Score: ${score}`;
            isGameOver = false;
            changingDirection = false;
            gameOverScreen.classList.remove('visible'); // Hide game over screen
            generateFood();
            
            // Clear any existing game loop to prevent multiple intervals
            if (gameInterval) clearInterval(gameInterval); 
            startGameLoop();
        }

        function startGameLoop() {
            // Set game speed (e.g., 100ms per tick)
            gameInterval = setInterval(gameTick, 120); 
        }

        function gameTick() {
            if (isGameOver) return;

            changingDirection = false; // Reset flag for next direction input

            clearCanvas();
            drawFood();
            moveSnake();
            drawSnake();

            checkCollision(); // Check collisions after moving the snake
        }

        function clearCanvas() {
            ctx.fillStyle = '#1a1a1a'; // Dark background for the game board
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawSnake() {
            ctx.fillStyle = '#00FF00'; // Green snake
            ctx.strokeStyle = '#008000'; // Darker green border
            snake.forEach(segment => {
                ctx.fillRect(segment.x * cellSize, segment.y * cellSize, cellSize, cellSize);
                ctx.strokeRect(segment.x * cellSize, segment.y * cellSize, cellSize, cellSize);
            });
        }

        function drawFood() {
            ctx.fillStyle = '#FF3333'; // Red food
            ctx.strokeStyle = '#CC0000'; // Darker red border
            ctx.beginPath();
            ctx.arc(
                food.x * cellSize + cellSize / 2,
                food.y * cellSize + cellSize / 2,
                cellSize / 2 * 0.7, // Smaller circle for food
                0,
                Math.PI * 2
            );
            ctx.fill();
            ctx.stroke();
        }

        function moveSnake() {
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            snake.unshift(head); // Add new head to the beginning of the snake array

            // Check if snake ate food
            if (head.x === food.x && head.y === food.y) {
                score++;
                scoreDisplay.textContent = `Score: ${score}`;
                generateFood(); // Generate new food
            } else {
                snake.pop(); // Remove tail if no food eaten
            }
        }

        function generateFood() {
            let newFoodX, newFoodY;
            let collisionWithSnake;
            do {
                newFoodX = Math.floor(Math.random() * gridSize);
                newFoodY = Math.floor(Math.random() * gridSize);
                // Ensure food does not spawn on the snake
                collisionWithSnake = snake.some(segment => segment.x === newFoodX && segment.y === newFoodY);
            } while (collisionWithSnake);
            food = { x: newFoodX, y: newFoodY };
        }

        function checkCollision() {
            const head = snake[0];

            // Wall collision
            if (head.x < 0 || head.x >= gridSize || head.y < 0 || head.y >= gridSize) {
                gameOver();
                return;
            }

            // Self collision (check if head collides with any part of its body)
            // Start checking from the 4th segment to avoid immediate collision with itself when changing direction
            for (let i = 1; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    gameOver();
                    return;
                }
            }
        }

        function gameOver() {
            isGameOver = true;
            clearInterval(gameInterval); // Stop the game loop
            finalScoreDisplay.textContent = score;
            gameOverScreen.classList.add('visible'); // Show game over screen
        }

        // Event listener for arrow key controls
        document.addEventListener('keydown', changeDirection);
        // Event listener for restart button
        restartButton.addEventListener('click', initGame);

        function changeDirection(event) {
            // Prevent rapid direction changes within a single game tick
            if (changingDirection) return;
            changingDirection = true;

            const keyPressed = event.key;

            const goingUp = dy === -1;
            const goingDown = dy === 1;
            const goingLeft = dx === -1;
            const goingRight = dx === 1;

            // Prevent reversing direction
            if (keyPressed === 'ArrowLeft' && !goingRight) {
                dx = -1;
                dy = 0;
                event.preventDefault(); // Prevent browser scrolling
            } else if (keyPressed === 'ArrowUp' && !goingDown) {
                dx = 0;
                dy = -1;
                event.preventDefault();
            } else if (keyPressed === 'ArrowRight' && !goingLeft) {
                dx = 1;
                dy = 0;
                event.preventDefault();
            } else if (keyPressed === 'ArrowDown' && !goingUp) {
                dx = 0;
                dy = 1;
                event.preventDefault();
            }
        }

        // Initialize the game when the script loads
        initGame();
    </script>
</body>
</html>
