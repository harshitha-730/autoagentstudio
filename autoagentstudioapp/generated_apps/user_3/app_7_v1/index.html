<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floral Stamp Collector</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: url('https://images.unsplash.com/photo-1518049104104-d57608229b1d?q=80&w=1974&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D'); /* Cherry Blossom background */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #333;
            overflow: hidden; /* Prevent scrollbar if stamps go slightly out of bounds */
        }

        #game-container {
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            padding: 30px;
            text-align: center;
            max-width: 900px;
            width: 95%;
            position: relative;
            overflow: hidden; /* Ensure game area overflow is hidden */
        }

        h1 {
            color: #d84364; /* Pinkish red */
            margin-bottom: 25px;
            font-size: 2.8em;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        h2 {
            color: #d84364;
            font-size: 2.2em;
        }

        h3 {
            color: #555;
            margin-top: 30px;
        }

        #difficulty-selection button,
        #restart-btn {
            background-color: #f7a9b8; /* Soft pink */
            color: white;
            border: none;
            padding: 12px 25px;
            margin: 0 10px 20px;
            border-radius: 25px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            outline: none;
        }

        #difficulty-selection button:hover,
        #restart-btn:hover {
            background-color: #d84364; /* Deeper pink */
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.15);
        }

        #game-info {
            display: flex;
            justify-content: space-around;
            margin-bottom: 25px;
            background-color: #fff0f5; /* Lighter pink background */
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #ffe4e6;
            color: #555;
            font-weight: bold;
            font-size: 1.1em;
        }

        #game-info span {
            color: #d84364;
            margin-left: 5px;
        }

        #game-area {
            width: 100%;
            height: 400px;
            border: 2px dashed #f0a0c2; /* Dashed pink border */
            border-radius: 10px;
            position: relative;
            background-color: rgba(255, 255, 255, 0.7);
            overflow: hidden; /* Crucial for stamps not going out */
            margin-bottom: 20px;
            box-sizing: border-box; /* Include padding and border in the element's total width and height */
        }

        .stamp {
            position: absolute;
            width: var(--stamp-size, 60px); /* Default size, will be overridden by JS */
            height: var(--stamp-size, 60px);
            border-radius: 50%; /* Circle shape */
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.9em;
            font-weight: bold;
            color: white;
            cursor: pointer;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.2);
            transition: transform 0.1s ease-out, opacity 0.3s ease-in-out;
            background-image: url('https://img.icons8.com/plasticine/100/stamp.png'); /* A placeholder stamp image */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            border: 3px solid #f0a0c2; /* Pink border for stamp */
        }

        .stamp:hover {
            transform: scale(1.05);
        }

        .stamp:active {
            transform: scale(0.95);
            opacity: 0.8;
        }

        .hidden {
            display: none !important;
        }

        #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 15px;
            z-index: 10;
        }

        #game-over-screen h2 {
            font-size: 3.5em;
            margin-bottom: 15px;
        }

        #game-over-screen p {
            font-size: 1.8em;
            color: #555;
            margin-bottom: 30px;
        }

        #instructions p {
            font-size: 0.95em;
            color: #666;
            line-height: 1.6;
        }

        /* Ensure buttons are properly spaced and centered */
        #difficulty-selection {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
            }
            #game-info {
                flex-direction: column;
                gap: 10px;
            }
            #difficulty-selection {
                flex-direction: column;
                gap: 10px;
            }
            #difficulty-selection button {
                margin: 0;
                width: 80%;
                max-width: 200px;
            }
            #game-area {
                height: 300px;
            }
            .stamp {
                width: var(--stamp-size, 50px);
                height: var(--stamp-size, 50px);
            }
        }

        @media (max-width: 480px) {
            #game-container {
                padding: 20px;
            }
            h1 {
                font-size: 1.8em;
            }
            #game-over-screen h2 {
                font-size: 2.5em;
            }
            #game-over-screen p {
                font-size: 1.4em;
            }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <h1>Floral Stamp Collector</h1>
        <div id="difficulty-selection">
            <button id="easy-btn" class="difficulty-btn">Easy</button>
            <button id="medium-btn" class="difficulty-btn">Medium</button>
            <button id="hard-btn" class="difficulty-btn">Hard</button>
        </div>
        <div id="game-info">
            <p>Score: <span id="score-display">0</span></p>
            <p>Time: <span id="time-display">00:00</span></p>
            <p>Stamps Collected: <span id="collected-display">0</span></p>
        </div>
        <div id="game-area">
            <!-- Stamps will appear here -->
        </div>
        <div id="game-over-screen" class="hidden">
            <h2>Game Over!</h2>
            <p>You collected <span id="final-score">0</span> stamps!</p>
            <button id="restart-btn">Play Again</button>
        </div>
        <div id="instructions">
            <h3>How to Play:</h3>
            <p>Click on the floral stamps as they appear before they disappear! Collect as many as you can within the time limit. Choose your difficulty level to start.</p>
        </div>
    </div>

    <script>
        const scoreDisplay = document.getElementById('score-display');
        const timeDisplay = document.getElementById('time-display');
        const collectedDisplay = document.getElementById('collected-display');
        const gameArea = document.getElementById('game-area');
        const easyBtn = document.getElementById('easy-btn');
        const mediumBtn = document.getElementById('medium-btn');
        const hardBtn = document.getElementById('hard-btn');
        const gameOverScreen = document.getElementById('game-over-screen');
        const finalScoreDisplay = document.getElementById('final-score');
        const restartBtn = document.getElementById('restart-btn');
        const instructionsDiv = document.getElementById('instructions');
        const difficultySelectionDiv = document.getElementById('difficulty-selection');

        let score = 0;
        let collectedStamps = 0;
        let timeRemaining = 0;
        let gameInterval;
        let stampSpawnInterval;
        let currentDifficulty = null;
        let gameRunning = false;
        const activeStamps = new Set(); // To keep track of stamps and their disappear timers

        const difficultySettings = {
            easy: {
                time: 60, // seconds
                spawnInterval: 1500, // ms for new stamp
                disappearTime: 2500, // ms before a stamp vanishes
                stampSize: '80px'
            },
            medium: {
                time: 45,
                spawnInterval: 1000,
                disappearTime: 1800,
                stampSize: '60px'
            },
            hard: {
                time: 30,
                spawnInterval: 700,
                disappearTime: 1200,
                stampSize: '40px'
            }
        };

        function updateDisplay() {
            scoreDisplay.textContent = score;
            collectedDisplay.textContent = collectedStamps;
            const minutes = Math.floor(timeRemaining / 60);
            const seconds = timeRemaining % 60;
            timeDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        function createStamp() {
            if (!gameRunning) return;

            const stamp = document.createElement('div');
            stamp.classList.add('stamp');
            
            // Get current dimensions of gameArea
            const gameAreaRect = gameArea.getBoundingClientRect();
            const stampSize = parseInt(difficultySettings[currentDifficulty].stampSize);

            // Calculate maximum top and left to ensure stamp is fully within gameArea
            const maxTop = gameAreaRect.height - stampSize;
            const maxLeft = gameAreaRect.width - stampSize;

            const top = Math.random() * (maxTop > 0 ? maxTop : 0); // Ensure non-negative
            const left = Math.random() * (maxLeft > 0 ? maxLeft : 0); // Ensure non-negative

            stamp.style.top = `${top}px`;
            stamp.style.left = `${left}px`;
            stamp.style.setProperty('--stamp-size', difficultySettings[currentDifficulty].stampSize);

            gameArea.appendChild(stamp);
            activeStamps.add(stamp); // Add to active stamps set

            const disappearTimeout = setTimeout(() => {
                removeStamp(stamp);
            }, difficultySettings[currentDifficulty].disappearTime);

            // Store the timeout ID so we can clear it if the stamp is clicked
            stamp.disappearTimeoutId = disappearTimeout;

            stamp.addEventListener('click', () => {
                if (gameRunning) {
                    score += 10; // Each stamp gives 10 points
                    collectedStamps++;
                    updateDisplay();
                    removeStamp(stamp);
                }
            });
        }

        function removeStamp(stampElement) {
            if (stampElement && activeStamps.has(stampElement)) {
                clearTimeout(stampElement.disappearTimeoutId); // Clear its individual disappear timer
                activeStamps.delete(stampElement); // Remove from set
                stampElement.remove();
            }
        }

        function clearAllStamps() {
            activeStamps.forEach(stamp => {
                clearTimeout(stamp.disappearTimeoutId);
                stamp.remove();
            });
            activeStamps.clear();
        }

        function countdown() {
            timeRemaining--;
            updateDisplay();

            if (timeRemaining <= 0) {
                endGame();
            }
        }

        function startGame(difficulty) {
            currentDifficulty = difficulty;
            score = 0;
            collectedStamps = 0;
            timeRemaining = difficultySettings[difficulty].time;
            gameRunning = true;

            clearAllStamps(); // Clear any existing stamps
            updateDisplay();
            
            instructionsDiv.classList.add('hidden');
            difficultySelectionDiv.classList.add('hidden');
            gameOverScreen.classList.add('hidden');

            gameInterval = setInterval(countdown, 1000);
            stampSpawnInterval = setInterval(createStamp, difficultySettings[difficulty].spawnInterval);
            
            // Create initial stamps immediately
            createStamp();
            if (difficulty === 'medium' || difficulty === 'hard') createStamp();
            if (difficulty === 'hard') createStamp();
        }

        function endGame() {
            gameRunning = false;
            clearInterval(gameInterval);
            clearInterval(stampSpawnInterval);
            clearAllStamps(); // Clear all stamps when game ends

            finalScoreDisplay.textContent = score;
            gameOverScreen.classList.remove('hidden');
            // We want the difficulty selection visible again so the user can pick
            difficultySelectionDiv.classList.remove('hidden'); 
        }

        // Event Listeners
        easyBtn.addEventListener('click', () => startGame('easy'));
        mediumBtn.addEventListener('click', () => startGame('medium'));
        hardBtn.addEventListener('click', () => startGame('hard'));
        restartBtn.addEventListener('click', () => {
            gameOverScreen.classList.add('hidden');
            instructionsDiv.classList.remove('hidden'); // Show instructions on restart
            // The difficulty selection will already be visible from endGame()
        });

        // Initial setup
        updateDisplay(); // Show initial 0s
    </script>
</body>
</html>
